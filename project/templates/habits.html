<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>habits</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {%for habit in habits%}
        <div>
            <h1>{{habit.name}}</h1>
            <p>{{habit.description}}</p>
            <a href="{{url_for('edit_habit',habit_id=habit.id)}}">Edit</a>
            <br>
            <a href="{{url_for('delete',habit_id=habit.id)}}">Delete</a>
            <br>
            <form action="{{ url_for('complete_habit', habit_id=habit.id) }}" method="post">
                <button type="submit">Complete Today</button>
                <br>
            </form>
            <form action="{{ url_for('streaks', habit_id=habit.id) }}" method="get">
                <button type="submit">streaks</button>
            </form>
        </div>
    {% endfor %}
    <br>
    <a href="{{url_for('create_habit')}}">create habits</a>
    <br>
    <a href="{{url_for('dashboard')}}">dashboard</a>
</body>
</html>
